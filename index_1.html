<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KleinBot RK10</title>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #ffffff;
    --surface: #fafaf8;
    --surface2: #f5f3ee;
    --border: #e6dfc8;
    --border-light: #eeead8;
    --gold: #b8902a;
    --gold-light: #d4a83c;
    --gold-dark: #7a5e10;
    --gold-pale: #fdf8ec;
    --green: #2d5a3d;
    --green-mid: #3a7050;
    --green-light: #4a8a62;
    --green-pale: #eef5f1;
    --text: #1c1a14;
    --text2: #3a3628;
    --muted: #8a8070;
    --muted-light: #bab09e;
    --red: #c0392b;
    --sticky-h: 80px;
  }
  * { margin:0; padding:0; box-sizing:border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Heebo', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 0 16px 0;
  }

  .topbar {
    width: 100%; height: 5px;
    background: linear-gradient(90deg, var(--green), var(--gold-light), var(--gold), var(--gold-light), var(--green));
  }

  /* ── LAYOUT: two zones ── */
  /* Top scrollable area */
  .scroll-zone {
    width: 100%; max-width: 680px;
    /* bottom padding = sticky bar height so content never hides behind it */
    padding-bottom: calc(var(--sticky-h) + 32px);
  }

  header {
    text-align: center;
    padding: 32px 0 16px;
  }
  .logo-wrap {
    width: 120px; height: 120px;
    margin: 0 auto 14px;
    display: flex; align-items: center; justify-content: center;
  }
  .logo-wrap img {
    width: 100%; height: 100%; object-fit: contain;
    filter: drop-shadow(0 2px 12px rgba(184,144,42,0.22));
  }
  .welcome { font-size: 1.05rem; color: var(--text); font-weight: 600; line-height: 1.5; }
  .sub { font-size: 0.78rem; color: var(--muted); font-weight: 300; margin-top: 5px; }

  .gold-divider { display:flex; align-items:center; gap:10px; margin:12px auto; width:200px; }
  .gold-divider::before { content:''; flex:1; height:1px; background:linear-gradient(90deg,transparent,var(--gold-light)); }
  .gold-divider::after  { content:''; flex:1; height:1px; background:linear-gradient(90deg,var(--gold-light),transparent); }
  .gold-divider span { width:6px; height:6px; border-radius:50%; background:var(--gold-light); }

  .status-pill {
    display:inline-flex; align-items:center; gap:7px;
    background:var(--green-pale); border:1px solid rgba(45,90,61,0.18);
    border-radius:100px; padding:5px 14px;
    font-size:0.7rem; color:var(--green); font-weight:600; margin-top:8px;
  }
  .dot { width:6px; height:6px; border-radius:50%; background:var(--green-light); box-shadow:0 0 6px rgba(74,138,98,0.6); }

  /* Chips */
  .suggestions {
    display:flex; flex-wrap:wrap; gap:8px;
    margin-bottom:16px;
  }
  .chip {
    background:var(--surface); border:1px solid var(--border);
    border-radius:100px; padding:6px 15px;
    font-size:0.77rem; color:var(--muted);
    cursor:pointer; transition:all 0.18s;
    font-family:'Heebo',sans-serif;
  }
  .chip:hover { border-color:var(--gold-light); color:var(--gold-dark); background:var(--gold-pale); }

  /* Content area */
  .content { display:flex; flex-direction:column; gap:14px; }

  /* Answer card */
  .acard {
    background:#fff;
    border:1.5px solid var(--border);
    border-radius:16px;
    padding:20px 22px;
    animation:up 0.28s ease;
    position:relative; overflow:hidden;
    box-shadow:0 2px 16px rgba(184,144,42,0.07);
  }
  .acard::before {
    content:'';
    position:absolute; top:0; right:0;
    width:4px; height:100%;
    background:linear-gradient(180deg,var(--gold-dark),var(--gold-light),var(--green-mid));
    border-radius:0 14px 14px 0;
  }
  @keyframes up { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }

  .ahead {
    display:flex; align-items:center; gap:10px;
    margin-bottom:14px; padding-bottom:12px;
    border-bottom:1px solid var(--border-light);
  }
  .aavatar { width:36px; height:36px; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
  .aavatar img { width:100%; height:100%; object-fit:contain; filter:drop-shadow(0 1px 4px rgba(184,144,42,0.2)); }
  .afrom { font-size:0.74rem; color:var(--gold-dark); font-weight:700; }

  .atext {
    line-height:1.95; color:var(--text2);
    font-size:0.94rem; white-space:pre-wrap; font-weight:300;
  }
  .atext.typing::after { content:'|'; animation:blink 0.7s infinite; color:var(--gold-light); }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }

  /* Contact footer inside "no answer" cards */
  .contact-links {
    margin-top:14px; padding-top:14px;
    border-top:1px solid var(--border-light);
    display:flex; flex-wrap:wrap; gap:8px;
  }
  .contact-btn {
    display:inline-flex; align-items:center; gap:6px;
    padding:8px 14px; border-radius:10px;
    font-family:'Heebo',sans-serif; font-size:0.8rem; font-weight:600;
    text-decoration:none; cursor:pointer; border:none;
    transition:opacity 0.18s, transform 0.1s;
  }
  .contact-btn:active { transform:scale(0.97); }
  .contact-btn.email {
    background:var(--gold-pale); color:var(--gold-dark);
    border:1px solid rgba(184,144,42,0.3);
  }
  .contact-btn.hombi {
    background:var(--green-pale); color:var(--green);
    border:1px solid rgba(45,90,61,0.2);
  }
  .contact-btn:hover { opacity:0.8; }

  /* History */
  .slabel { font-size:0.66rem; color:var(--muted-light); letter-spacing:2px; text-transform:uppercase; }
  .hlist { display:flex; flex-direction:column; gap:8px; }
  .hitem {
    background:var(--surface); border:1px solid var(--border-light);
    border-radius:12px; padding:12px 16px; cursor:pointer;
    transition:border-color 0.18s, background 0.18s;
  }
  .hitem:hover { border-color:var(--gold-light); background:var(--gold-pale); }
  .hq { font-size:0.83rem; color:var(--text); font-weight:500; }
  .ha { font-size:0.75rem; color:var(--muted); margin-top:3px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }

  /* Footer */
  .footer-bar {
    padding:20px 0 12px;
    border-top:1px solid var(--border-light);
    display:flex; align-items:center; justify-content:center; gap:10px;
  }
  .footer-logo { width:26px; height:26px; display:flex; align-items:center; justify-content:center; opacity:0.5; }
  .footer-logo img { width:100%; height:100%; object-fit:contain; }
  .footer-text { font-size:0.7rem; color:var(--muted-light); }

  /* ── STICKY INPUT BAR ── */
  .sticky-bar {
    position:fixed; bottom:0; left:0; right:0;
    background:rgba(255,255,255,0.97);
    backdrop-filter:blur(12px);
    border-top:1.5px solid var(--border);
    box-shadow:0 -4px 24px rgba(0,0,0,0.07);
    z-index:100;
    display:flex; justify-content:center;
    padding:10px 16px 14px;
  }
  .sticky-inner {
    width:100%; max-width:680px;
    display:flex; flex-direction:column; gap:6px;
  }

  .rec-strip {
    display:none; align-items:center; gap:8px;
    font-size:0.73rem; color:var(--red); font-weight:500;
  }
  .rec-strip.active { display:flex; }
  .rec-dot { width:8px; height:8px; border-radius:50%; background:var(--red); animation:blink-dot 1s infinite; }
  @keyframes blink-dot { 0%,100%{opacity:1} 50%{opacity:0.2} }

  .input-row { display:flex; align-items:flex-end; gap:8px; }

  .textarea-wrap {
    flex:1;
    background:var(--surface);
    border:1.5px solid var(--border);
    border-radius:14px; overflow:hidden;
    transition:border-color 0.2s, box-shadow 0.2s;
    display:flex; align-items:flex-end;
  }
  .textarea-wrap:focus-within {
    border-color:var(--gold-light);
    box-shadow:0 0 0 3px rgba(184,144,42,0.09);
  }

  textarea {
    flex:1; background:transparent; border:none; outline:none;
    color:var(--text); font-family:'Heebo',sans-serif;
    font-size:0.97rem; padding:12px 14px; resize:none;
    line-height:1.6; max-height:120px; direction:rtl; font-weight:300;
  }
  textarea::placeholder { color:var(--muted-light); }

  .mic-btn {
    width:38px; height:38px; margin:5px 5px 5px 0;
    border-radius:50%; border:none; cursor:pointer;
    display:flex; align-items:center; justify-content:center; flex-shrink:0;
    background:transparent; color:var(--muted); font-size:1.1rem;
    transition:all 0.18s;
  }
  .mic-btn:hover { background:var(--gold-pale); color:var(--gold-dark); }
  .mic-btn.recording {
    background:#fee2e2; color:var(--red);
    animation:pulse-mic 1.2s ease-in-out infinite;
  }
  @keyframes pulse-mic {
    0%,100% { box-shadow:0 0 0 0 rgba(192,57,43,0.3); }
    50%      { box-shadow:0 0 0 8px rgba(192,57,43,0); }
  }

  .ask-btn {
    background:linear-gradient(135deg,var(--gold-dark),var(--gold-light));
    color:#fff; border:none; border-radius:14px;
    padding:0 20px; height:50px; min-width:110px;
    font-family:'Heebo',sans-serif; font-size:0.9rem; font-weight:700;
    cursor:pointer; flex-shrink:0;
    transition:opacity 0.2s, transform 0.1s;
    display:flex; align-items:center; justify-content:center; gap:6px;
    box-shadow:0 2px 12px rgba(122,94,16,0.25);
  }
  .ask-btn:hover { opacity:0.88; transform:translateY(-1px); }
  .ask-btn:active { transform:scale(0.97); }
  .ask-btn:disabled { opacity:0.4; cursor:not-allowed; transform:none; box-shadow:none; }

  .spinner {
    width:15px; height:15px;
    border:2px solid rgba(255,255,255,0.35);
    border-top-color:#fff;
    border-radius:50%; animation:spin 0.6s linear infinite;
  }
  @keyframes spin { to{transform:rotate(360deg)} }

  /* Mail modal */
  .modal-overlay {
    display:none; position:fixed; inset:0;
    background:rgba(0,0,0,0.35); backdrop-filter:blur(4px);
    z-index:300; align-items:center; justify-content:center; padding:16px;
  }
  .modal-overlay.open { display:flex; }
  .modal {
    background:#fff; border-radius:20px; width:100%; max-width:500px;
    box-shadow:0 8px 40px rgba(0,0,0,0.18);
    animation:modalUp 0.25s ease;
    overflow:hidden;
  }
  @keyframes modalUp { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:translateY(0)} }
  .modal-header {
    background:linear-gradient(135deg,var(--gold-dark),var(--gold-light));
    padding:18px 22px;
    display:flex; align-items:center; justify-content:space-between;
  }
  .modal-title { color:#fff; font-size:1rem; font-weight:700; }
  .modal-close {
    background:rgba(255,255,255,0.2); border:none; border-radius:50%;
    width:28px; height:28px; color:#fff; font-size:1rem;
    cursor:pointer; display:flex; align-items:center; justify-content:center;
    transition:background 0.18s;
  }
  .modal-close:hover { background:rgba(255,255,255,0.35); }
  .modal-body { padding:22px; display:flex; flex-direction:column; gap:14px; }
  .modal-field label { font-size:0.76rem; color:var(--muted); font-weight:600; margin-bottom:5px; display:block; }
  .modal-field input,
  .modal-field textarea {
    width:100%; background:var(--surface); border:1.5px solid var(--border);
    border-radius:10px; padding:10px 14px;
    font-family:'Heebo',sans-serif; font-size:0.9rem; color:var(--text);
    outline:none; transition:border-color 0.18s; direction:rtl;
    max-height:none; min-height:auto;
  }
  .modal-field input:focus,
  .modal-field textarea:focus { border-color:var(--gold-light); }
  .modal-field textarea { resize:vertical; min-height:90px; }
  .modal-footer { padding:0 22px 20px; display:flex; gap:10px; justify-content:flex-end; }
  .modal-send {
    background:linear-gradient(135deg,var(--gold-dark),var(--gold-light));
    color:#fff; border:none; border-radius:10px;
    padding:10px 24px; font-family:'Heebo',sans-serif;
    font-size:0.88rem; font-weight:700; cursor:pointer;
    display:flex; align-items:center; gap:7px;
    box-shadow:0 2px 10px rgba(122,94,16,0.2);
    transition:opacity 0.18s;
  }
  .modal-send:hover { opacity:0.88; }
  .modal-send:disabled { opacity:0.4; cursor:not-allowed; }
  .modal-cancel {
    background:var(--surface); border:1.5px solid var(--border);
    color:var(--muted); border-radius:10px;
    padding:10px 18px; font-family:'Heebo',sans-serif;
    font-size:0.88rem; font-weight:500; cursor:pointer;
    transition:border-color 0.18s;
  }
  .modal-cancel:hover { border-color:var(--gold-light); }

  .toast {
    position:fixed; bottom:90px; left:50%;
    transform:translateX(-50%) translateY(20px);
    background:#fff; border:1px solid var(--border);
    border-radius:12px; padding:10px 20px;
    font-size:0.8rem; color:var(--gold-dark);
    z-index:200; white-space:nowrap;
    box-shadow:0 4px 20px rgba(0,0,0,0.09);
    opacity:0; transition:opacity 0.3s, transform 0.3s;
  }
  .toast.show { opacity:1; transform:translateX(-50%) translateY(0); }
</style>
</head>

// ── Storage ─────────────────────────────────────────────────────
async function sGet(k) { try { return await window.storage.get(k); } catch { return null; } }
async function sSet(k, v) { try { return await window.storage.set(k, v); } catch { return null; } }

// ── Recording via Web Speech API (Chrome desktop) ─────────────
let isRecording = false;
let activeSpeechRec = null;

function setRecState(on) {
  isRecording = on;
  const btn = document.getElementById('micBtn');
  const strip = document.getElementById('recStrip');
  btn.classList.toggle('recording', on);
  btn.textContent = on ? '\u23F9\uFE0F' : '\uD83C\uDFA4';
  strip.classList.toggle('active', on);
  updateStickyHeight();
}

function toggleRecording() {
  if (isRecording) {
    // Stop current recognition
    if (activeSpeechRec) { try { activeSpeechRec.stop(); } catch(e) {} }
    setRecState(false);
    return;
  }

  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) {
    showToast('זיהוי קולי אינו נתמך — נסה Chrome');
    return;
  }

  const r = new SR();
  activeSpeechRec = r;
  r.lang = 'he-IL';
  r.continuous = false;
  r.interimResults = true;
  r.maxAlternatives = 1;

  let finalTranscript = '';

  r.onstart = () => setRecState(true);

  r.onresult = e => {
    let interim = '';
    finalTranscript = '';
    for (let i = 0; i < e.results.length; i++) {
      if (e.results[i].isFinal) finalTranscript += e.results[i][0].transcript;
      else interim += e.results[i][0].transcript;
    }
    const el = document.getElementById('q');
    el.value = finalTranscript || interim;
    autoResize(el);
  };

  r.onend = () => {
    activeSpeechRec = null;
    setRecState(false);
    const val = (finalTranscript || document.getElementById('q').value).trim();
    if (val) setTimeout(() => ask(), 300);
  };

  r.onerror = e => {
    activeSpeechRec = null;
    setRecState(false);
    if (e.error === 'not-allowed' || e.error === 'service-not-allowed') {
      showToast('יש לאשר גישה למיקרופון בדפדפן');
    } else if (e.error === 'no-speech') {
      showToast('לא זוהה קול — נסה שוב');
    } else if (e.error === 'network') {
      showToast('שגיאת רשת בזיהוי קולי');
    } else {
      showToast('שגיאה: ' + e.error);
    }
  };

  try {
    r.start();
  } catch(e) {
    setRecState(false);
    showToast('לא ניתן להפעיל מיקרופון: ' + e.message);
  }
}

// ── Scroll answer into view (above sticky bar) ──────────────────
function scrollToAnswer() {
  const card = document.getElementById('latestAnswer');
  if (!card) return;
  const barH = document.querySelector('.sticky-bar').offsetHeight;
  const cardTop = card.getBoundingClientRect().top + window.scrollY;
  const target = cardTop - 16; // 16px breathing room above card
  window.scrollTo({ top: target, behavior: 'smooth' });
}

// ── Ask ─────────────────────────────────────────────────────────
async function ask() {
  const inp = document.getElementById('q');
  const q = inp.value.trim();
  if (!q) return;

  const btn = document.getElementById('askBtn');
  btn.disabled = true;
  btn.innerHTML = '<div class="spinner"></div>';

  document.getElementById('answerArea').innerHTML = `
    <div class="acard" id="latestAnswer">
      <div class="ahead">
        <div class="aavatar"><img src="${LOGO}" alt="RK10"></div>
        <div class="afrom">ועד הבניין · רועי קליין 10</div>
      </div>
      <div class="atext typing" id="atext">&#x200F;</div>
    </div>`;

  // Scroll so card top is visible above sticky bar
  setTimeout(scrollToAnswer, 80);

  inp.value = '';
  inp.style.height = 'auto';

  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'x-api-key': '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', 'anthropic-version': '2023-06-01', 'anthropic-dangerous-direct-browser-access': 'true' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        system: SYSTEM,
        messages: [{ role: 'user', content: q }]
      })
    });
    const data = await res.json();
    const raw = (data.content?.[0]?.text || '').trim();

    const noAnswer = raw === 'NO_ANSWER' || raw.startsWith('NO_ANSWER');

    if (noAnswer) {
      // Show friendly "not found" card with contact buttons
      document.getElementById('atext').classList.remove('typing');
      document.getElementById('atext').innerHTML =
        'מצטערים, לא מצאנו מידע על כך במדריך הבניין שלנו. נשמח לעזור בדרכים הבאות:';

      // Store q in global so modal can access it without inline string escaping issues
      window._pendingMailQ = q;
      const contactDiv = document.createElement('div');
      contactDiv.className = 'contact-links';
      contactDiv.innerHTML = `
        <button class="contact-btn email" onclick="openMailModal()">
          ✉️ &nbsp;שלח מייל לועד
        </button>
        <a class="contact-btn hombi" href="https://hombi.co/signinwithcode.html?code=QoFw_pet_N" target="_blank" rel="noopener">
          🏠 &nbsp;פתח קריאה ב-Hombi
        </a>`;
      document.getElementById('latestAnswer').appendChild(contactDiv);
    } else {
      // Typewriter for normal answer
      const el = document.getElementById('atext');
      el.textContent = '';
      const chars = [...raw];
      let i = 0;
      const iv = setInterval(() => {
        const cur = document.getElementById('atext');
        if (!cur) { clearInterval(iv); return; }
        cur.textContent += chars[i] || '';
        i++;
        if (i >= chars.length) { clearInterval(iv); cur.classList.remove('typing'); }
      }, 14);
    }

    saveHist(q, noAnswer ? '(ללא תשובה במדריך)' : raw);
  } catch (err) {
    const el = document.getElementById('atext');
    if (el) { el.classList.remove('typing'); el.textContent = 'שגיאה: ' + err.message; }
  }

  btn.disabled = false;
  btn.innerHTML = '<span>שאל אותנו</span><span>&#x2192;</span>';
}

// ── History ──────────────────────────────────────────────────────
async function saveHist(q, a) {
  let h = [];
  try { const r = await sGet('rk10v6'); if (r) h = JSON.parse(r.value); } catch {}
  h.unshift({ q, a });
  if (h.length > 10) h = h.slice(0, 10);
  await sSet('rk10v6', JSON.stringify(h));
  renderHist(h);
}

async function loadHist() {
  try { const r = await sGet('rk10v6'); if (r) renderHist(JSON.parse(r.value)); } catch {}
}

function renderHist(h) {
  if (!h || !h.length) return;
  document.getElementById('histLabel').style.display = 'block';
  window._h = h;
  document.getElementById('histList').innerHTML = h.map((x, i) => `
    <div class="hitem" onclick="replayH(${i})">
      <div class="hq">${esc(x.q)}</div>
      <div class="ha">${esc(x.a)}</div>
    </div>`).join('');
}

function replayH(i) {
  const x = window._h?.[i];
  if (!x) return;
  document.getElementById('answerArea').innerHTML = `
    <div class="acard" id="latestAnswer">
      <div class="ahead">
        <div class="aavatar"><img src="${LOGO}" alt="RK10"></div>
        <div class="afrom">ועד הבניין · רועי קליין 10</div>
      </div>
      <div class="atext">${esc(x.a)}</div>
    </div>`;
  setTimeout(scrollToAnswer, 80);
}

function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2800);
}

// ── Mail modal ───────────────────────────────────────────────────
let currentMailQuestion = '';

function openMailModal(question) {
  // Accept argument or fall back to stored global
  const q = (question !== undefined && question !== null) ? question : (window._pendingMailQ || '');
  currentMailQuestion = q;
  document.getElementById('mailBody').value = q;
  document.getElementById('mailName').value = '';
  document.getElementById('mailApt').value = '';
  document.getElementById('mailModal').classList.add('open');
  setTimeout(() => document.getElementById('mailName').focus(), 100);
}

function closeMailModal(e) {
  if (e && e.target !== document.getElementById('mailModal')) return;
  document.getElementById('mailModal').classList.remove('open');
}

async function sendMailViaAPI() {
  const name = document.getElementById('mailName').value.trim() || 'דייר';
  const apt  = document.getElementById('mailApt').value.trim();
  const body = document.getElementById('mailBody').value.trim();
  if (!body) { showToast('נא למלא את השאלה'); return; }

  const btn = document.getElementById('mailSendBtn');
  btn.disabled = true;
  btn.innerHTML = '<div class="spinner" style="border-top-color:#fff;width:14px;height:14px"></div>';

  // Build a nicely formatted message via Claude, then display confirmation
  const fullMsg = `שם: ${name}${apt ? '\nדירה: ' + apt : ''}\n\nשאלה:\n${body}`;

  try {
    // Use Claude to compose a polished email body
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'x-api-key': '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', 'anthropic-version': '2023-06-01', 'anthropic-dangerous-direct-browser-access': 'true' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 400,
        system: 'אתה עוזר לנסח הודעת מייל קצרה ומנומסת לועד בניין, בעברית. החזר את תוכן ההודעה בלבד.',
        messages: [{ role: 'user', content: `נסח הודעת מייל לועד הבניין רועי קליין 10 מאת ${name}${apt ? ', ' + apt : ''}.\nתוכן: ${body}` }]
      })
    });
    const data = await res.json();
    const composed = data.content?.[0]?.text || fullMsg;

    // Open mailto with composed text
    const subject = encodeURIComponent('שאלה מדייר - ' + (apt || name));
    const mailBody = encodeURIComponent(composed);
    const link = `mailto:vaadrk10@gmail.com?subject=${subject}&body=${mailBody}`;

    // Try window.open first, fallback to location
    const opened = window.open(link, '_blank');
    if (!opened) window.location.href = link;

    document.getElementById('mailModal').classList.remove('open');
    showToast('✓ נפתחה אפליקציית המייל');
  } catch(err) {
    // Fallback: direct mailto without composition
    const subject = encodeURIComponent('שאלה מדייר');
    const mailBody = encodeURIComponent(fullMsg);
    window.open(`mailto:vaadrk10@gmail.com?subject=${subject}&body=${mailBody}`, '_blank');
    document.getElementById('mailModal').classList.remove('open');
    showToast('✓ נפתחה אפליקציית המייל');
  }

  btn.disabled = false;
  btn.innerHTML = '<span>שלח לועד</span><span>&#x2192;</span>';
}
